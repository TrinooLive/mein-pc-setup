<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinoo Setups - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #0b0e14; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-container { background-color: #151a22; padding: 40px; border-radius: 12px; text-align: center; border: 1px solid #2c364c; }
        .btn-twitch { cursor: pointer; padding: 12px 24px; background-color: #9146ff; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div class="login-container" id="app">
        <h1>Anmelden</h1>
        <button onclick="performLogin()" class="btn-twitch">
            Mit Twitch anmelden
        </button>
    </div>

    <script>
        // Wir nutzen einen anderen Namen für die Konstante, um Kollisionen zu vermeiden
        const sbClient = supabase.createClient(
            "https://dvttzclfrfufhjqdyswu.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2dHR6Y2xmcmZ1ZmhqcWR5c3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTEzNzMxNjIsImV4cCI6MjA2Njk0OTE2Mn0.zC6iW72r4i3yvO03A0C8-555"
        );

        // Prüfung, ob wir gerade vom Login zurückkommen
        sbClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('app').innerHTML = "<h1>Erfolgreich angemeldet!</h1><p>Willkommen, " + session.user.user_metadata.name + "</p>";
            }
        });

        async function performLogin() {
            const { error } = await sbClient.auth.signInWithOAuth({
                provider: 'twitch',
                options: { redirectTo: "https://mein-pc-setup.vercel.app" }
            });
            if (error) {
                alert("Login fehlgeschlagen: " + error.message);
            }
        }
    </script>
</body>
</html>
