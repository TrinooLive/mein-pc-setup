<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch.tv/Trinoo's Setup</title>
    <style>
        :root { --bg: #0b0e14; --card: #151a22; --accent: #9146ff; --text: #ffffff; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        h1, h2 { color: var(--accent); }
        .hardware-grid { display: grid; gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #2c364c; }
        a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .twitch-link { display: inline-block; padding: 10px 20px; background: var(--accent); color: white; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Twitch.tv/Trinoo's Setup</h1>
        <p>Hardware-Nerd & Gaming-Urgestein aus Flensburg.</p>
        <a href="https://twitch.tv/trinoo" class="twitch-link">Besuche mich auf Twitch</a>

        <h2>Mein Gaming Setup</h2>
        <div class="hardware-grid">
            <!-- Hier deine Hardware-Einträge -->
            <div class="card">
                <strong>Grafikkarte:</strong> NVIDIA RTX 4090 - <a href="#">Link zum Produkt</a>
            </div>
            <div class="card">
                <strong>Prozessor:</strong> AMD Ryzen 9 7950X3D - <a href="#">Link zum Produkt</a>
            </div>
            <div class="card">
                <strong>Maus:</strong> Logitech G Pro X Superlight - <a href="#">Link zum Produkt</a>
            </div>
            <!-- Du kannst diese <div class="card">...</div> Blöcke einfach kopieren und anpassen -->
        </div>
    </div>

</body>
</html>
