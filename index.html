// Ersetze dein aktuelles <a href="..."> durch diesen Button mit onclick-Funktion:
<button onclick="loginWithProvider('twitch')" class="btn-twitch">
    Mit Twitch anmelden
</button>

<script>
    async function loginWithProvider(provider) {
        const { data, error } = await supabaseClient.auth.signInWithOAuth({
            provider: provider,
            options: {
                redirectTo: "https://mein-pc-setup.vercel.app",
                // WICHTIG: Das hier steuert das Fenster-Verhalten
                // 'pkce' leitet auf der gleichen Seite weiter, 
                // 'implicit' erzwingt meistens ein Popup-Fenster
                flowType: 'implicit' 
            }
        });
        if (error) console.error(error);
    }
</script>
