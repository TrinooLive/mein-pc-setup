<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch.tv/Trinoo | PC-Setups</title>
    <style>
        body { 
            background: #111; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        h1 { color: #00ff88; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 1.2rem; margin-top: 0; margin-bottom: 30px; }
        
        /* Twitch-Button */
        .twitch-btn {
            display: inline-block;
            background: #9146FF;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(145, 70, 255, 0.3);
            margin-bottom: 40px;
        }
        .twitch-btn:hover {
            background: #772ce8;
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(145, 70, 255, 0.6);
        }

        /* Formular Container */
        .setup-container {
            max-width: 500px;
            margin: 0 auto;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .setup-container h2 {
            margin-top: 0;
            color: #00ff88;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        /* Eingabefelder */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid #444;
            border-radius: 5px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00ff88;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: #00ff88;
            color: #111;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .submit-btn:hover {
            background: #00cc6e;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }
    </style>
</head>
<body>

    <h1>Twitch.tv/Trinoo</h1>
    <p class="subtitle">Community-Projekt</p>
    
    <a href="https://twitch.tv/Trinoo" target="_blank" class="twitch-btn">👾 Besuche den Stream</a>

    <!-- Hier startet das neue Setup-Formular -->
    <div class="setup-container">
        <h2>Dein PC-Setup eintragen</h2>
        
        <form onsubmit="alert('Setup abgeschickt! (Datenbank-Anbindung folgt im nächsten Level 😉)'); return false;">
            <div class="form-group">
                <label for="prozessor">Prozessor (CPU)</label>
                <input type="text" id="prozessor" placeholder="z.B. AMD Ryzen 7 7800X3D oder Intel Core i9">
            </div>
            
            <div class="form-group">
                <label for="grafikkarte">Grafikkarte (GPU)</label>
                <input type="text" id="grafikkarte" placeholder="z.B. NVIDIA RTX 4080 Super / RX 7900 XTX">
            </div>
            
            <div class="form-group">
                <label for="ram">Arbeitsspeicher (RAM)</label>
                <input type="text" id="ram" placeholder="z.B. 32GB DDR5 6000MHz">
            </div>
            
            <div class="form-group">
                <label for="netzteil">Netzteil (PSU)</label>
                <input type="text" id="netzteil" placeholder="z.B. 850W be quiet! Straight Power 12">
            </div>
            
            <button type="submit" class="submit-btn">Setup jetzt teilen 🚀</button>
        </form>
    </div>

</body>
