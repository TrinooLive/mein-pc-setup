<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinoo Setups - Login</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151a22;
            --text-color: #ffffff;
            --text-muted: #8a9ba8;
            --input-bg: #1c2331;
            --border-color: #2c364c;
            --primary: #3b82f6;
            --twitch: #9146ff;
            --discord: #5865f2;
            --google: #ea4335;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            margin-bottom: 6px;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Social Buttons */
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-social:active {
            transform: scale(0.98);
        }

        .btn-twitch { background-color: var(--twitch); }
        .btn-discord { background-color: var(--discord); }
        .btn-google { background-color: var(--google); }

        .btn-social:hover {
            opacity: 0.9;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            margin: 24px 0;
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* Form Controls */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-switch a {
            color: var(--primary);
            text-decoration: none;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .error { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }
        .success { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #22c55e; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1 id="form-title">Anmelden</h1>
        <div class="subtitle">Trinoo Setups Dashboard</div>

        <!-- Social Logins -->
        <div class="social-buttons">
            <button class="btn-social btn-twitch" onclick="loginWithProvider('twitch')">
                Mit Twitch anmelden
            </button>
            <button class="btn-social btn-discord" onclick="loginWithProvider('discord')">
                Mit Discord anmelden
            </button>
            <button class="btn-social btn-google" onclick="loginWithProvider('google')">
                Mit Google anmelden
            </button>
        </div>

        <div class="divider">oder klassisch</div>

        <!-- E-Mail / Passwort Form -->
        <form id="auth-form" onsubmit="handleAuth(event)">
            <div class="form-group">
                <label for="email">E-Mail-Adresse</label>
                <input type="email" id="email" required placeholder="name@beispiel.de">
            </div>
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary" id="submit-btn">Einloggen</button>
        </form>

        <div id="message"></div>

        <div class="auth-switch" id="auth-switch-container">
            Noch kein Konto? <a href="#" onclick="toggleMode(event)">Jetzt registrieren</a>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            "https://dvttzclfrfufhjqdyswu.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2dHR6Y2xmcmZ1ZmhqcWR5c3d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTEzNzMxNjIsImV4cCI6MjA2Njk0OTE2Mn0.zC6iW72r4i3yvO03A0C8-555"
        );

        let isLoginMode = true;

        async function loginWithProvider(provider) {
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: provider,
                options: {
                    redirectTo: "https://mein-pc-setup.vercel.app"
                }
            });

            if (error) {
                showMessage(error.message, true);
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            hideMessage();

            if (isLoginMode) {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    showMessage(error.message, true);
                } else {
                    showMessage("Erfolgreich eingeloggt! Du wirst weitergeleitet...", false);
                }
            } else {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) {
                    showMessage(error.message, true);
                } else {
                    showMessage("Registrierung erfolgreich! Du bist jetzt eingeloggt.", false);
                }
            }
        }

        function toggleMode(event) {
            event.preventDefault();
            isLoginMode = !isLoginMode;
            
            const formTitle = document.getElementById('form-title');
            const submitBtn = document.getElementById('submit-btn');
            const switchContainer = document.getElementById('auth-switch-container');

            if (isLoginMode) {
                formTitle.innerText = "Anmelden";
                submitBtn.innerText = "Einloggen";
                switchContainer.innerHTML = 'Noch kein Konto? <a href="#" onclick="toggleMode(event)">Jetzt registrieren</a>';
            } else {
                formTitle.innerText = "Registrieren";
                submitBtn.innerText = "Konto erstellen";
                switchContainer.innerHTML = 'Bereits registriert? <a href="#" onclick="toggleMode(event)">Hier einloggen</a>';
            }
        }

        function showMessage(text, isError) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = text;
            msgDiv.className = isError ? 'error' : 'success';
            msgDiv.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                console.log("User ist eingeloggt:", user);
            }
        }
        checkUser();
    </script>
</body>
</html>
