<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinoo Setups - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151a22;
            --text-color: #ffffff;
            --twitch: #9146ff;
            --border-color: #2c364c;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-container { background-color: var(--card-bg); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--border-color); text-align: center; }
        .btn-twitch { display: block; width: 100%; padding: 12px; margin-bottom: 20px; background-color: var(--twitch); color: white; text-decoration: none; border-radius: 6px; font-weight: bold; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Anmelden</h1>
        <!-- Dieser Link geht direkt zum Supabase-Auth-Endpunkt, ohne JavaScript -->
        <a href="https://dvttzclfrfufhjqdyswu.supabase.co/auth/v1/authorize?provider=twitch&redirect_to=https://mein-pc-setup.vercel.app" class="btn-twitch">
            Mit Twitch anmelden
        </a>
    </div>

</body>
</html>
