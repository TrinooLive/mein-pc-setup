<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch.tv/Trinoo | PC-Setups Platform</title>
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { 
            background: #111; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        h1 { color: #00ff88; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 1.2rem; margin-top: 0; margin-bottom: 30px; }
        
        /* Sprachumschalter Header */
        .lang-switch-container {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            gap: 8px;
        }
        .lang-btn {
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .lang-btn.active {
            border-color: #00ff88;
            color: #00ff88;
            background: #1a3a2a;
        }

        /* Automatisches Geo-IP Sprach-Popup */
        .geo-popup {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a3a2a;
            border: 1px solid #00ff88;
            padding: 12px 25px;
            border-radius: 30px;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            align-items: center;
            gap: 15px;
            animation: slideDown 0.4s ease forwards;
        }
        @keyframes slideDown {
            from { top: -60px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }
        .geo-popup button {
            background: #00ff88;
            color: #111;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .geo-popup .close-geo {
            background: none;
            color: #888;
            cursor: pointer;
            border: none;
            font-size: 1.1rem;
        }

        /* Twitch Stream Button */
        .twitch-btn {
            display: inline-block;
            background: #9146FF;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(145, 70, 255, 0.3);
            margin-bottom: 40px;
        }
        .twitch-btn:hover {
            background: #772ce8;
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(145, 70, 255, 0.6);
        }

        /* Container für Login und Formular / Profil */
        .setup-container {
            max-width: 500px;
            margin: 0 auto 40px auto;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .setup-container.profil-view-layout {
            max-width: 950px;
        }
        .setup-container h2 {
            margin-top: 0;
            color: #00ff88;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        /* Grid für die Profil-Ansicht */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-top: 20px;
        }
        @media (min-width: 768px) {
            .profile-grid {
                grid-template-columns: 1.2fr 1fr;
            }
        }

        /* Platzhalter für Setup Bilder */
        .media-box {
            background: #252525;
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            color: #888;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }
        .media-box p { margin: 10px 0 0 0; font-size: 0.95rem; }

        /* Social Login Buttons */
        .login-section {
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px dashed #333;
        }
        .login-title {
            font-size: 0.9rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .social-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: #fff;
        }
        .social-btn:hover { transform: translateY(-1px); opacity: 0.9; }
        
        .btn-twitch { background: #9146FF; }
        
        /* User Status Anzeige */
        .user-status {
            display: none;
            background: #252525;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #00ff88;
            color: #fff;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .logout-btn {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Formular Bereich */
        .form-area {
            opacity: 0.2;
            pointer-events: none;
            user-select: none;
            transition: opacity 0.3s ease;
        }
        .form-area.unlocked {
            opacity: 1;
            pointer-events: auto;
            user-select: auto;
        }
        
        /* Eingabefelder */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid #444;
            border-radius: 5px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00ff88;
        }

        /* Ausklappbarer Hardware-Bereich */
        .optional-toggle {
            color: #00ff88;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 20px;
            display: inline-block;
            text-decoration: underline;
        }
        .optional-fields {
            display: none;
            border-top: 1px dashed #333;
            padding-top: 20px;
            margin-top: 10px;
        }
        .optional-fields.show {
            display: block;
        }

        /* Buttons */
        .submit-btn {
            width: 100%;
            background: #00ff88;
            color: #111;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .submit-btn:hover {
            background: #00cc6e;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .edit-action-btn {
            background: #222;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 6px 14px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            float: right;
            margin-top: -38px;
            transition: all 0.2s;
        }
        .edit-action-btn:hover {
            background: #00ff88;
            color: #111;
        }

        /* Community Liste Bereich */
        .list-container {
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
        }
        .list-container h3 {
            color: #00ff88;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        
        /* Klickbare Setup Card */
        .setup-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .setup-card:hover {
            transform: translateY(-2px);
            border-color: #00ff88;
        }
        .setup-card-header {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 10px;
            border-bottom: 1px dashed #2a2a2a;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .view-profile-hint {
            color: #00ff88;
            font-size: 0.8rem;
        }
        .component-line {
            margin: 6px 0;
            font-size: 0.95rem;
        }
        .component-label {
            color: #aaa;
            font-weight: bold;
            display: inline-block;
            width: 150px;
        }

        /* Profil Ansicht Styling */
        .profil-view {
            display: none;
        }
        .profil-view.active {
            display: block;
        }
        .back-btn {
            display: inline-block;
            background: #333;
            color: #fff;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .back-btn:hover { background: #444; }
        
        /* Teilen-Button im Profil */
        .share-btn {
            display: block;
            width: 100%;
            background: #00ff88;
            color: #111;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            margin-top: 20px;
        }
        .share-btn.copied {
            background: #252525;
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .profil-spec-box {
            background: #252525;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #00ff88;
        }
        .profil-spec-box .component-line {
            font-size: 1.1rem;
            margin: 12px 0;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
            display: flex;
            align-items: flex-start;
        }
        .profil-spec-box .component-line:last-child {
            border-bottom: none;
        }
        .profil-spec-box .component-label {
            width: 150px; 
            min-width: 150px;
            color: #00ff88;
            display: inline-block;
        }
        
        /* Inline Edit Styling */
        .edit-input-field {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        .edit-input-field:focus {
            border-color: #00ff88;
            outline: none;
        }

        /* ADMIN AREA */
        .admin-copy-container {
            max-width: 500px;
            margin: 60px auto 20px auto;
            padding-top: 20px;
            border-top: 1px dashed #333;
        }
        .admin-copy-btn {
            background: #222;
            color: #666;
            border: 1px solid #333;
            padding: 10px 15px;
            font-size: 0.85rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Manueller Sprachumschalter oben rechts -->
    <div class="lang-switch-container">
        <button class="lang-btn active" id="btnLangDe" onclick="setLanguage('de')">🇩🇪 DE</button>
        <button class="lang-btn" id="btnLangEn" onclick="setLanguage('en')">🇬🇧 EN</button>
    </div>

    <!-- Geo-IP Smart Popup -->
    <div class="geo-popup" id="geoPopup">
        <span id="geoPopupText">Switch to English?</span>
        <button id="geoPopupActionBtn" onclick="acceptGeoLanguage()">Yes</button>
        <button class="close-geo" onclick="closeGeoPopup()">✕</button>
    </div>

    <h1 data-i18n="mainTitle">Twitch.tv/Trinoo</h1>
    <p class="subtitle" data-i18n="mainSubtitle">Community-Projekt</p>
    
    <a href="https://twitch.tv/Trinoo" target="_blank" class="twitch-btn" data-i18n="visitStream">👾 Besuche den Stream</a>

    <!-- STANDARD ANSICHT: FORMULAR -->
    <div class="setup-container" id="mainFormContainer">
        <h2 data-i18n="formTitle">Setup einreichen</h2>
        
        <!-- Login Sektion -->
        <div class="login-section" id="loginSection">
            <div class="login-title" data-i18n="loginTitle">Zuerst anmelden (Testmodus):</div>
            <div class="social-grid">
                <button class="social-btn btn-twitch" onclick="testLogin()" data-i18n="loginTwitchBtn">👾 Mit Twitch einloggen (Test-Bypass)</button>
            </div>
        </div>

        <!-- Status-Anzeige nach dem Login -->
        <div class="user-status" id="userStatus">
            <span data-i18n="loggedInAs">🟢 Als Tester eingeloggt:</span> <span id="username" style="color: #00ff88;">Zuschauer</span>
            <br>
            <button class="logout-btn" onclick="logout()" data-i18n="logoutBtn">[ Abmelden ]</button>
        </div>
        
        <!-- Formular Bereich -->
        <div class="form-area" id="formArea">
            <form onsubmit="setupAbschicken(); return false;">
                <div class="form-group">
                    <label for="prozessor" data-i18n="labelCpu">Prozessor (CPU)</label>
                    <input type="text" id="prozessor" placeholder="e.g. AMD Ryzen, Intel Core..." required>
                </div>
                
                <div class="form-group">
                    <label for="grafikkarte" data-i18n="labelGpu">Grafikkarte (GPU)</label>
                    <input type="text" id="grafikkarte" placeholder="e.g. ASUS, MSI, NVIDIA GeForce, AMD Radeon..." required>
                </div>
                
                <div class="form-group">
                    <label for="ram" data-i18n="labelRam">Arbeitsspeicher (Memory)</label>
                    <input type="text" id="ram" placeholder="e.g. Corsair Vengeance, G.Skill, Kingston..." required>
                </div>

                <!-- ERWEITERTE ANGABEN (ZUKLAPPBAR) -->
                <span class="optional-toggle" id="optionalToggleBtn" onclick="toggleOptionalFields()" data-i18n="toggleMore">+ Mehr Hardware & Peripherie hinzufügen (optional)</span>
                
                <div class="optional-fields" id="optionalFields">
                    <div class="form-group">
                        <label for="mainboard" data-i18n="labelMb">Mainboard (Motherboard)</label>
                        <input type="text" id="mainboard" placeholder="e.g. ASUS ROG, MSI, Gigabyte, ASRock...">
                    </div>
                    <div class="form-group">
                        <label for="kuehler" data-i18n="labelCooling">Kühler / AIO (Cooling)</label>
                        <input type="text" id="kuehler" placeholder="e.g. Corsair iCUE, NZXT Kraken, Noctua, be quiet!...">
                    </div>
                    <div class="form-group">
                        <label for="festplatte" data-i18n="labelStorage">Festplatten (Storage)</label>
                        <input type="text" id="festplatte" placeholder="e.g. Samsung NVMe SSD, WD Black, Crucial...">
                    </div>
                    <div class="form-group">
                        <label for="gehaeuse" data-i18n="labelCase">Gehäuse (Case)</label>
                        <input type="text" id="gehaeuse" placeholder="e.g. Lian Li, NZXT, Fractal Design, Corsair...">
                    </div>
                    <div class="form-group">
                        <label for="case_fan" data-i18n="labelFans">Gehäuselüfter (Case Fan)</label>
                        <input type="text" id="case_fan" placeholder="e.g. Lian Li UNI FAN, Corsair LL120...">
                    </div>
                    <div class="form-group">
                        <label for="netzteil" data-i18n="labelPsu">Netzteil (PSU)</label>
                        <input type="text" id="netzteil" placeholder="e.g. be quiet! Dark Power, Seasonic, Corsair...">
                    </div>
                    <div class="form-group">
                        <label for="cablemod" data-i18n="labelCablemod">Custom Kabel (CableMod)</label>
                        <input type="text" id="cablemod" placeholder="e.g. CableMod Pro Extension Kit...">
                    </div>
                    <div class="form-group">
                        <label for="monitor" data-i18n="labelMonitor">Monitor</label>
                        <input type="text" id="monitor" placeholder="e.g. LG UltraGear, Samsung Odyssey, ASUS ROG...">
                    </div>
                    <div class="form-group">
                        <label for="keyboard" data-i18n="labelKeyboard">Tastatur (Keyboard)</label>
                        <input type="text" id="keyboard" placeholder="e.g. Custom Mechanical, Logitech G, Razer...">
                    </div>
                    <div class="form-group">
                        <label for="mouse" data-i18n="labelMouse">Maus (Mouse)</label>
                        <input type="text" id="mouse" placeholder="e.g. Logitech G Pro X Superlight, Razer Viper...">
                    </div>
                    <div class="form-group">
                        <label for="headset" data-i18n="labelHeadset">Headset / Kopfhörer</label>
                        <input type="text" id="headset" placeholder="e.g. Beyerdynamic DT 990, Audio-Technica, SteelSeries...">
                    </div>
                    <div class="form-group">
                        <label for="sound" data-i18n="labelSound">Sound / Mikrofon / Soundkarte</label>
                        <input type="text" id="sound" placeholder="e.g. Shure SM7B, Focusrite Scarlett, Elgato Wave...">
                    </div>
                    <div class="form-group">
                        <label for="webcam" data-i18n="labelWebcam">Webcam / Kamera</label>
                        <input type="text" id="webcam" placeholder="e.g. Elgato Facecam, Sony Alpha, Logitech...">
                    </div>
                    <div class="form-group">
                        <label for="chair" data-i18n="labelChair">Gaming Stuhl (Chair)</label>
                        <input type="text" id="chair" placeholder="e.g. Secretlab TITAN, Backforce One, Noblechairs...">
                    </div>
                    <div class="form-group">
                        <label for="desk" data-i18n="labelDesk">Schreibtisch (Desk)</label>
                        <input type="text" id="desk" placeholder="e.g. Höhenverstellbarer Schreibtisch, IKEA Karlby...">
                    </div>
                    <div class="form-group">
                        <label for="accessories" data-i18n="labelAccessories">Zubehör (Accessories)</label>
                        <input type="text" id="accessories" placeholder="e.g. Stream Deck, Elgato Light Strip...">
                    </div>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn" data-i18n="submitBtnTxt">Setup abschicken 🚀</button>
            </form>
        </div>
    </div>

    <!-- ZWEISPALTIGE EINZELPROFIL ANSICHT & EDIT MODE -->
    <div class="setup-container profil-view profil-view-layout" id="profilContainer">
        <button class="back-btn" onclick="zurueckZurStartseite()" data-i18n="backBtn">⬅ Zurück zur Übersicht</button>
        
        <!-- Dynamischer Bearbeitungs-Button (nur sichtbar für den Eigentümer) -->
        <button class="edit-action-btn" id="profileEditBtn" onclick="toggleEditMode()" style="display: none;" data-i18n="editBtnTxt">Bearbeiten 🛠️</button>
        
        <h2 id="profilTitle">PC Setup</h2>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 20px;" id="profilMeta">...</p>
        
        <div class="profile-grid">
            <!-- Linke Spalte: Smarte Hardware-Liste (wird via JS befüllt oder in Inputs verwandelt) -->
            <div class="profil-spec-box" id="hardwareSpecBox"></div>
            
            <!-- Rechte Spalte: Bilder Platzhalter & Interaktion -->
            <div>
                <div class="media-box" id="mediaBoxContainer"></div>
                <button class="share-btn" id="shareBtn" onclick="linkKopieren()" data-i18n="copyLinkBtn">Setup-Link kopieren 📋</button>
                <button class="share-btn" id="saveEditBtn" onclick="saveSetupChanges()" style="display: none; background: #00ff88; color: #111;" data-i18n="saveBtnTxt">Änderungen speichern 💾</button>
            </div>
        </div>
    </div>

    <!-- EINGEREICHTE SETUPS LISTE -->
    <div class="list-container" id="communityListContainer">
        <h3 id="communityListTitle" data-i18n="latestSetups">🖥️ Die 3 neuesten Community-Setups</h3>
        <div id="setupsList"></div>
    </div>

    <!-- ADMIN AREA -->
    <div class="admin-copy-container">
        <button class="admin-copy-btn" id="adminCopyBtn" onclick="quellcodeKopieren()">➔ Ganzen Quellcode für Gemini kopieren 🛠️</button>
    </div>

                geoSuggest: "Auf Englisch umschalten?",
                editBtnTxt: "Bearbeiten 🛠️",
                cancelBtnTxt: "Abbrechen ✕",
                saveBtnTxt: "Änderungen speichern 💾",
                updateSuccess: "Setup erfolgreich aktualisiert! 📋✨"
            },
            en: {
                mainTitle: "Twitch.tv/Trinoo",
                mainSubtitle: "Community Project",
                visitStream: "👾 Visit the Stream",
                formTitle: "Submit Setup",
                loginTitle: "Login first (Test Mode):",
                loginTwitchBtn: "👾 Login with Twitch (Test Bypass)",
                loggedInAs: "🟢 Logged in as Tester:",
                logoutBtn: "[ Logout ]",
                labelCpu: "Processor (CPU)",
                labelGpu: "Graphics Card (GPU)",
                labelRam: "Memory (RAM)",
                toggleMore: "+ Add more hardware & peripherals (optional)",
                toggleLess: "- Show less details",
                labelMb: "Motherboard",
                labelCooling: "Cooling / AIO",
                labelStorage: "Storage (SSD/HDD)",
                labelCase: "Case",
                labelFans: "Case Fans",
                labelPsu: "Power Supply (PSU)",
                labelCablemod: "Custom Cables (CableMod)",
                labelMonitor: "Monitor",
                labelKeyboard: "Keyboard",
                labelMouse: "Mouse",
                labelHeadset: "Headset / Headphones",
                labelSound: "Sound / Mic / Audio Card",
                labelWebcam: "Webcam / Camera",
                labelChair: "Gaming Chair",
                labelDesk: "Desk",
                labelAccessories: "Accessories",
                submitBtnTxt: "Submit Setup 🚀",
                backBtn: "⬅ Back to Overview",
                copyLinkBtn: "Copy Setup Link 📋",
                latestSetups: "🖥️ The 3 Latest Community Setups",
                linkCopied: "Link copied! ✓",
                dbLoading: "Loading setups from database...",
                dbEmpty: "No setups found.",
                setupCardTitle: "Setup",
                viewProfile: "View Profile ➔",
                registeredOn: "Registered in database on",
                mediaTitle: "<strong>Image Gallery Coming Soon!</strong>",
                mediaDesc: "Soon you will be able to upload photos here directly.",
                alertSuccess: "Boom! Your setup has been saved securely! 🖥️🔥",
                geoSuggest: "Switch website to English?",
                editBtnTxt: "Edit Setup 🛠️",
                cancelBtnTxt: "Cancel ✕",
                saveBtnTxt: "Save Changes 💾",
                updateSuccess: "Setup updated successfully! 📋✨"
            }
        };

        const hardwareLabels = {
            cpu: { de: "Prozessor:", en: "Processor:" },
            gpu: { de: "Grafikkarte:", en: "Graphics Card:" },
            ram: { de: "RAM:", en: "RAM:" },
            mainboard: { de: "Mainboard:", en: "Motherboard:" },
            kuehler: { de: "Kühler / AIO:", en: "Cooling / AIO:" },
            festplatte: { de: "Speicher:", en: "Storage:" },
            gehaeuse: { de: "Gehäuse:", en: "Case:" },
            case_fan: { de: "Gehäuselüfter:", en: "Case Fans:" },
            netzteil: { de: "Netzteil:", en: "Power Supply:" },
            cablemod: { de: "Custom Kabel:", en: "Custom Cables:" },
            monitor: { de: "Monitor:", en: "Monitor:" },
            keyboard: { de: "Tastatur:", en: "Keyboard:" },
            mouse: { de: "Maus:", en: "Mouse:" },
            headset: { de: "Headset:", en: "Headset:" },
            sound: { de: "Sound/Audio:", en: "Sound/Audio:" },
            webcam: { de: "Webcam:", en: "Webcam:" },
            chair: { de: "Stuhl:", en: "Chair:" },
            desk: { de: "Schreibtisch:", en: "Desk:" },
            accessories: { de: "Zubehör:", en: "Accessories:" }
        };

        // Alle verfügbaren Hardware-Felder im System
        const fieldsMapConfig = [
            { key: 'cpu', required: true }, { key: 'gpu', required: true }, { key: 'ram', required: true },
            { key: 'mainboard' }, { key: 'kuehler' }, { key: 'festplatte' }, { key: 'gehaeuse' },
            { key: 'case_fan' }, { key: 'netzteil' }, { key: 'cablemod' }, { key: 'monitor' },
            { key: 'keyboard' }, { key: 'mouse' }, { key: 'headset' }, { key: 'sound' },
            { key: 'webcam' }, { key: 'chair' }, { key: 'desk' }, { key: 'accessories' }
        ];

        window.onload = function() {
            // Prüfen ob bereits eine Test-Session im LocalStorage existiert
            if(localStorage.getItem('trinoo_tester_logged') === 'true') {
                activateTestLoginState();
            }
            detectUserLocation();
            renderPageBasedOnUrl();
        };

        function renderPageBasedOnUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const setupId = urlParams.get('id');

            applyTranslations();

            if (setupId) {
                profilAbrufen(setupId);
            } else {
                setupsAbrufen();
            }
        }

        function setLanguage(lang) {
            aktuelleSprache = lang;
            
            document.getElementById('btnLangDe').classList.remove('active');
            document.getElementById('btnLangEn').classList.remove('active');
            if(lang === 'de') document.getElementById('btnLangDe').classList.add('active');
            if(lang === 'en') document.getElementById('btnLangEn').classList.add('active');

            applyTranslations();

            if(istImEditModus) {
                // Wenn im Edit-Modus, nur Labels neu übersetzen, nicht neu laden um Inputverlust zu meiden
                return; 
            }

            const urlParams = new URLSearchParams(window.location.search);
            const setupId = urlParams.get('id');
            if (setupId) {
                profilAbrufen(setupId);
            } else {
                setupsAbrufen();
            }
        }

        function applyTranslations() {
            const t = translations[aktuelleSprache];
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    if (key === 'toggleMore' && document.getElementById('optionalFields').classList.contains('show')) {
                        el.innerText = t['toggleLess'];
                    } else {
                        el.innerText = t[key];
                    }
                }
            });

            const mediaBox = document.getElementById('mediaBoxContainer');
            if (mediaBox) {
                mediaBox.innerHTML = `
                    <span style="font-size: 2.5rem;">📸</span>
                    <p>${t.mediaTitle}</p>
                    <p style="font-size: 0.8rem; color: #666;">${t.mediaDesc}</p>
                `;
            }
        }

        async function detectUserLocation() {
            try {
                const response = await fetch('http://ip-api.com/json/');
                const data = await response.json();
                
                const germanicCountries = ['DE', 'AT', 'CH'];
                if (data && data.countryCode && !germanicCountries.includes(data.countryCode)) {
                    geoVorgeschlageneSprache = 'en';
                    
                    if (aktuelleSprache === 'de') {
                        document.getElementById('geoPopupText').innerText = translations['en'].geoSuggest;
                        document.getElementById('geoPopupActionBtn').innerText = "Yes";
                        document.getElementById('geoPopup').style.display = 'flex';
                    }
                }
            } catch (e) {
                console.log("Geo-IP API konnte nicht geladen werden.");
            }
        }

        function acceptGeoLanguage() {
            if (geoVorgeschlageneSprache) {
                setLanguage(geoVorgeschlageneSprache);
            }
            closeGeoPopup();
        }

        function closeGeoPopup() {
            document.getElementById('geoPopup').style.animation = "none";
            document.getElementById('geoPopup').style.display = 'none';
        }

        function toggleOptionalFields() {
            const fields = document.getElementById('optionalFields');
            fields.classList.toggle('show');
            const toggleBtn = document.getElementById('optionalToggleBtn');
            const t = translations[aktuelleSprache];
            
            if(fields.classList.contains('show')) {
                toggleBtn.innerText = t.toggleLess;
            } else {
                toggleBtn.innerText = t.toggleMore;
            }
        }

        function testLogin() {
            localStorage.setItem('trinoo_tester_logged', 'true');
            activateTestLoginState();
            renderPageBasedOnUrl(); // Aktualisiere Ansicht, um ggf. Edit-Buttons freizuschalten
        }

        function activateTestLoginState() {
            isLoggedIn = true;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userStatus').style.display = 'block';
            document.getElementById('formArea').classList.add('unlocked');
        }

        function logout() {
            localStorage.removeItem('trinoo_tester_logged');
            isLoggedIn = false;
            istImEditModus = false;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('userStatus').style.display = 'none';
            document.getElementById('formArea').classList.remove('unlocked');
            document.getElementById('profileEditBtn').style.display = 'none';
            document.getElementById('saveEditBtn').style.display = 'none';
            document.getElementById('shareBtn').style.display = 'block';
            renderPageBasedOnUrl();
        }

        async function setupsAbrufen() {
            document.getElementById('setupsList').innerHTML = `<p style="color: #666; text-align: center;">${translations[aktuelleSprache].dbLoading}</p>`;
            
            const { data, error } = await dbClient
                .from('setups')
                .select('id, created_at, cpu, gpu, ram')
                .order('id', { ascending: false })
                .limit(3);

            if (error) {
                document.getElementById('setupsList').innerHTML = `<p style="color: #ff4444;">Error: ${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('setupsList').innerHTML = `<p style="color: #666; text-align: center;">${translations[aktuelleSprache].dbEmpty}</p>`;
                return;
            }

            let listHtml = '';
            data.forEach((setup) => {
                const eintragDatum = new Date(setup.created_at).toLocaleString(aktuelleSprache === 'de' ? 'de-DE' : 'en-US', { 
                    day: '2-digit', month: '2-digit', year: 'numeric' 
                });
                
                listHtml += `
                    <a href="?id=${setup.id}" class="setup-card">
                        <div class="setup-card-header">
                            <span>💾 ${translations[aktuelleSprache].setupCardTitle} #${setup.id} - ${eintragDatum}</span>
                            <span class="view-profile-hint">${translations[aktuelleSprache].viewProfile}</span>
                        </div>
                        <div class="component-line"><span class="component-label">${hardwareLabels.cpu[aktuelleSprache]}</span> ${setup.cpu}</div>
                        <div class="component-line"><span class="component-label">${hardwareLabels.gpu[aktuelleSprache]}</span> ${setup.gpu}</div>
                        <div class="component-line"><span class="component-label">${hardwareLabels.ram[aktuelleSprache]}</span> ${setup.ram}</div>
                    </a>
                `;
            });
            document.getElementById('setupsList').innerHTML = listHtml;
        }

        async function profilAbrufen(id) {
            document.getElementById('mainFormContainer').style.display = 'none';
            document.getElementById('communityListContainer').style.display = 'none';
            document.getElementById('profilContainer').classList.add('active');

            const { data, error } = await dbClient.from('setups').select('*').eq('id', id).single();

            if (error || !data) {
                document.getElementById('profilTitle').innerText = "Setup error!";
                return;
            }

            // Zwischenspeichern des aktuellen Datensatzes für die Edit-Logik
            aktuellesGeladenesSetup = data;

            // Da wir im Test-Modus sind, darf der eingeloggte Tester JEDES Profil bearbeiten.
            // Später prüfen wir hier: if(isLoggedIn && data.user_id === currentUser.id)
            if (isLoggedIn) {
                document.getElementById('profileEditBtn').style.display = 'block';
            } else {
                document.getElementById('profileEditBtn').style.display = 'none';
            }

            renderProfileViewData();
        }

        // Rendert die reinen Textdaten (Clean View)
        function renderProfileViewData() {
            istImEditModus = false;
            document.getElementById('profileEditBtn').innerText = translations[aktuelleSprache].editBtnTxt;
            document.getElementById('saveEditBtn').style.display = 'none';
            document.getElementById('shareBtn').style.display = 'block';

            const data = aktuellesGeladenesSetup;
            const eintragDatum = new Date(data.created_at).toLocaleString(aktuelleSprache === 'de' ? 'de-DE' : 'en-US', { 
                day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });

            document.getElementById('profilTitle').innerText = `${translations[aktuelleSprache].setupCardTitle} #${data.id}`;
            document.getElementById('profilMeta').innerText = `${translations[aktuelleSprache].registeredOn} ${eintragDatum}`;
            
            let hardwareHtml = '';
            fieldsMapConfig.forEach(field => {
                const val = data[field.key];
                // Blende leere oder nicht definierte Felder im Profil komplett aus (wie builds.gg)
                if (val && val.trim() !== '' && val !== '--') {
                    const isCoreField = (field.key === 'cpu' || field.key === 'gpu' || field.key === 'ram');
                    const textStyle = isCoreField ? 'font-weight: bold; color: #fff;' : 'color: #ccc;';
                    hardwareHtml += `
                        <div class="component-line" id="view_line_${field.key}">
                            <span class="component-label">${hardwareLabels[field.key][aktuelleSprache]}</span>
                            <span style="${textStyle}">${val}</span>
                        </div>
                    `;
                }
            });

            document.getElementById('hardwareSpecBox').innerHTML = hardwareHtml;
        }

        // Schaltet zwischen reiner Ansicht und interaktiven Input-Feldern um (Edit Mode)
        function toggleEditMode() {
            if(istImEditModus) {
                // Abbrechen geklickt -> zurück zur normalen Ansicht
                renderProfileViewData();
            } else {
                // Bearbeiten geklickt -> Verwandle Text-Zeilen in bearbeitbare Inputs
                istImEditModus = true;
                document.getElementById('profileEditBtn').innerText = translations[aktuelleSprache].cancelBtnTxt;
                document.getElementById('saveEditBtn').style.display = 'block';
                document.getElementById('shareBtn').style.display = 'none';

                let editHardwareHtml = '';
                fieldsMapConfig.forEach(field => {
                    // Im Edit-Modus zeigen wir ALLE Felder an, damit man gelöschte hinzufügen kann
                    const currentVal = aktuellesGeladenesSetup[field.key] || '';
                    const placeholderTxt = field.required ? 'required' : 'optional...';
                    
                    editHardwareHtml += `
                        <div class="component-line" style="margin-bottom: 12px; border-bottom: 1px dashed #333; padding-bottom: 8px;">
                            <label class="component-label" for="edit_input_${field.key}" style="display:block; margin-bottom: 4px;">
                                ${hardwareLabels[field.key][aktuelleSprache]} ${field.required ? '*' : ''}
                            </label>
                            <input type="text" class="edit-input-field" id="edit_input_${field.key}" value="${currentVal}" placeholder="${placeholderTxt}" ${field.required ? 'required' : ''}>
                        </div>
                    `;
                });

                document.getElementById('hardwareSpecBox').innerHTML = editHardwareHtml;
            }
        }

        // Sendet die geänderten Daten via UPDATE an Supabase
        async function saveSetupChanges() {
            if(!aktuellesGeladenesSetup) return;

            // Validierung der Pflichtfelder im Editier-Modus
            const updatedCpu = document.getElementById('edit_input_cpu').value;
            const updatedGpu = document.getElementById('edit_input_gpu').value;
            const updatedRam = document.getElementById('edit_input_ram').value;

            if(!updatedCpu || !updatedGpu || !updatedRam) {
                alert("CPU, GPU and RAM are required!");
                return;
            }

            // Datenobjekt dynamisch zusammenbauen
            const updateData = {};
            fieldsMapConfig.forEach(field => {
                const inputEl = document.getElementById(`edit_input_${field.key}`);
                if(inputEl) {
                    updateData[field.key] = inputEl.value;
                }
            });

            // Update in Supabase ausführen
            const { error } = await dbClient
                .from('setups')
                .update(updateData)
                .eq('id', aktuellesGeladenesSetup.id);

            if (error) {
                alert("Update Error: " + error.message);
            } else {
                alert(translations[aktuelleSprache].updateSuccess);
                // Lokalen State aktualisieren und Ansicht zurücksetzen
                aktuellesGeladenesSetup = { ...aktuellesGeladenesSetup, ...updateData };
                renderProfileViewData();
            }
        }

        function zurueckZurStartseite() {
            window.location.href = window.location.origin + window.location.pathname;
        }

        function linkKopieren() {
            const profilUrl = window.location.href;
            navigator.clipboard.writeText(profilUrl).then(() => {
                const btn = document.getElementById('shareBtn');
                btn.innerText = translations[aktuelleSprache].linkCopied;
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerText = translations[aktuelleSprache].copyLinkBtn;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function quellcodeKopieren() {
            const ganzerCode = document.documentElement.outerHTML;
            const saubererCode = "<!DOCTYPE html>\n" + ganzerCode;
            navigator.clipboard.writeText(saubererCode).then(() => {
                const btn = document.getElementById('adminCopyBtn');
                btn.innerText = "Code kopiert! Bereit für Gemini ✓";
                setTimeout(() => { btn.innerText = "➔ Ganzen Quellcode für Gemini kopieren 🛠️"; }, 2000);
            });
        }

        async function setupAbschicken() {
            const sendData = {
                cpu: document.getElementById('prozessor').value,
                gpu: document.getElementById('grafikkarte').value,
                ram: document.getElementById('ram').value,
                mainboard: document.getElementById('mainboard').value,
                kuehler: document.getElementById('kuehler').value,
                festplatte: document.getElementById('festplatte').value,
                gehaeuse: document.getElementById('gehaeuse').value,
                case_fan: document.getElementById('case_fan').value,
                netzteil: document.getElementById('netzteil').value,
                cablemod: document.getElementById('cablemod').value,
                monitor: document.getElementById('monitor').value,
                keyboard: document.getElementById('keyboard').value,
                mouse: document.getElementById('mouse').value,
                headset: document.getElementById('headset').value,
                sound: document.getElementById('sound').value,
                webcam: document.getElementById('webcam').value,
                chair: document.getElementById('chair').value,
                desk: document.getElementById('desk').value,
                accessories: document.getElementById('accessories').value
            };

            const { data, error } = await dbClient.from('setups').insert([sendData]).select();

            if (error) {
                alert("Database Error: " + error.message);
            } else {
                alert(translations[aktuelleSprache].alertSuccess);
                
                // Komfort-Feature: Leite den User nach dem Abschicken direkt auf sein neues Profil um
                if(data && data[0] && data[0].id) {
                    window.location.search = `?id=${data[0].id}`;
                } else {
                    window.location.reload();
                }
            }
        }
    </script>
